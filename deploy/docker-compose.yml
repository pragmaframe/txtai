services:

  # ── MCP OAuth 2.1 proxy ───────────────────────────────────────────────────
  # Handles dynamic client registration, Google OIDC login, JWT issuance,
  # and transparent proxying of authenticated /mcp requests to txtai.
  #
  # OPNSense nginx proxies all traffic here on port 8080.
  mcp-auth:
    build: ./mcp_auth
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MCP_DOMAIN: ${MCP_DOMAIN}
      ALLOWED_EMAIL: ${ALLOWED_EMAIL:-}
      TXTAI_URL: http://txtai:8000
    depends_on:
      - txtai

  # ── txtai API ─────────────────────────────────────────────────────────────
  # Internal only — no host port binding, reachable only by mcp-auth.
  # Custom build patches fastapi_mcp to include server_url so tool calls work.
  txtai:
    build: ./txtai
    command: uvicorn "txtai.api:app" --host 0.0.0.0 --port 8000
    environment:
      CONFIG: /config/config.yml
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ${INDEX_PATH:-./index.tar.gz}:/data/index/index.tar.gz:ro
    restart: unless-stopped
