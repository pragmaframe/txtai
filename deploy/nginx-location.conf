# OPNSense nginx plugin — location block for ragmcp.yourdomain.com
#
# Paste this into the "Custom Settings" / location block for the vhost.
# The server block should already have:
#   listen 443 ssl;
#   ssl_certificate     /path/to/fullchain.pem;
#   ssl_certificate_key /path/to/privkey.pem;
#
# Request flow:
#   Claude.ai → HTTPS 443 → OPNSense → nginx → oauth2-proxy:4180 → txtai:8000

location / {
    proxy_pass http://127.0.0.1:4180;

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── SSE / MCP transport requirements ─────────────────────────────────────
    # MCP uses Server-Sent Events (SSE).  SSE requires:
    #   1. HTTP/1.1 keep-alive (not chunked HTTP/2 framing)
    #   2. No response buffering (events must flush immediately)
    #   3. Long read timeout (SSE streams can be open for minutes)
    proxy_http_version 1.1;
    proxy_set_header   Connection '';      # keep-alive, not upgrade
    proxy_buffering    off;                # flush SSE events immediately
    proxy_cache        off;
    proxy_read_timeout 3600s;             # 1-hour max stream lifetime
}

# oauth2-proxy callback endpoint — must be reachable without authentication
location /oauth2/ {
    proxy_pass http://127.0.0.1:4180;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
